name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Le client Prisma et components.d.ts sont gitignorés : on les régénère.
      - name: Generate Prisma client
        run: npx prisma generate --schema=src/main/prisma/schema.prisma

      # better-sqlite3 est natif : on le recompile pour l'ABI d'Electron.
      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Typecheck
        run: npm run typecheck

      # Dépendances système nécessaires pour lancer Electron/Chromium sous Linux.
      - name: Install browser system deps
        run: npx playwright install-deps

      # Electron a besoin d'un serveur d'affichage : on l'exécute sous xvfb.
      - name: Run E2E tests
        run: xvfb-run -a npm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7